<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>歩ける語り場 v020</title>
  <link rel="stylesheet" href="style.css?v=020" />
</head>
<body>
  <main class="app-shell">
    <section id="titleScreen" class="title-screen">
      <div class="title-card">
        <p class="eyebrow">Virtual Community Map</p>
        <h1>歩ける語り場</h1>
        <p class="lead">v020では、配置エディタにグリッド表示・吸着・レイヤー表示切替を追加しています。</p>
        <button id="startButton" class="primary-button">スタート</button>
        <p class="small-note">操作：十字キー / WASD / 画面下の移動ボタン。近くで「調べる」。</p>
      </div>
    </section>

    <section id="gameScreen" class="game-screen hidden" aria-label="ゲーム画面">
      <header class="top-bar">
        <div class="status-row">
          <div class="status-main">
            <p class="caption">現在地</p>
            <h2 id="areaName">語り場4U付近</h2>
            <div class="badge-row">
              <span id="dayBadge" class="day-badge">今日</span>
              <span id="experienceBadge" class="experience-badge">体験 0</span>
              <span id="achievementBadge" class="achievement-badge">実績 0/0</span>
            </div>
          </div>
          <button id="menuButton" class="ghost-button menu-button" aria-expanded="false" aria-controls="topActions">メニュー</button>
        </div>
        <div id="topActions" class="top-actions action-drawer" aria-label="メニュー">
          <button id="dayButton" class="ghost-button">曜日切替</button>
          <button id="debugButton" class="ghost-button">座標OFF</button>
          <button id="memoButton" class="ghost-button">メモ</button>
          <button id="achievementButton" class="ghost-button">実績</button>
          <button id="linkHubButton" class="ghost-button">リンク</button>
          <button id="editorButton" class="ghost-button">編集</button>
          <button id="resetButton" class="ghost-button">最初から</button>
        </div>
      </header>

      <div class="canvas-wrap">
        <canvas id="gameCanvas" width="1000" height="1000" aria-label="マップ"></canvas>
        <p id="debugText" class="debug-text hidden">x=0 / y=0</p>
        <div id="loading" class="loading">読み込み中...</div>
      </div>

      <p id="hintText" class="hint-text">近くの人や看板、扉の前で「調べる」を押してください。</p>

      <div class="controls" aria-label="操作ボタン">
        <div class="dpad" aria-label="移動パッド">
          <button data-dir="up" class="dpad-btn up">▲</button>
          <button data-dir="left" class="dpad-btn left">◀</button>
          <button data-dir="down" class="dpad-btn down">▼</button>
          <button data-dir="right" class="dpad-btn right">▶</button>
        </div>
        <button id="actionButton" class="action-button">調べる</button>
      </div>
    </section>

    <section id="modal" class="modal hidden" aria-modal="true" role="dialog">
      <div class="modal-panel">
        <button id="modalXButton" class="modal-x-button" aria-label="閉じる">×</button>
        <h3 id="modalTitle">タイトル</h3>
        <p id="modalBody">本文</p>
        <div id="modalChoices" class="modal-choices"></div>
      </div>
    </section>
  </main>

  <script src="script.js?v=020"></script>
</body>
</html>
