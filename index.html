<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>語り場4U 仮想コミュニティ v001</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section id="titleScreen" class="title-screen">
      <div class="title-card">
        <p class="eyebrow">Virtual Community Map</p>
        <h1>歩ける語り場</h1>
        <p class="lead">語り場4Uを中心に、くさのね劇場・ブランチカフェへ歩いて向かうv001デモです。</p>
        <button id="startButton" class="primary-button">スタート</button>
        <p class="small-note">操作：十字キー / WASD / 画面下の移動ボタン。近くで「調べる」。</p>
      </div>
    </section>

    <section id="gameScreen" class="game-screen hidden" aria-label="ゲーム画面">
      <header class="top-bar">
        <div>
          <p class="caption">現在地</p>
          <h2 id="areaName">語り場4U付近</h2>
        </div>
        <button id="resetButton" class="ghost-button">最初から</button>
      </header>

      <div class="canvas-wrap">
        <canvas id="gameCanvas" width="1000" height="1000" aria-label="マップ"></canvas>
        <div id="loading" class="loading">読み込み中...</div>
      </div>

      <p id="hintText" class="hint-text">近くの人や看板、扉の前で「調べる」を押してください。</p>

      <div class="controls" aria-label="操作ボタン">
        <div class="dpad" aria-label="移動パッド">
          <button data-dir="up" class="dpad-btn up">▲</button>
          <button data-dir="left" class="dpad-btn left">◀</button>
          <button data-dir="down" class="dpad-btn down">▼</button>
          <button data-dir="right" class="dpad-btn right">▶</button>
        </div>
        <button id="actionButton" class="action-button">調べる</button>
      </div>
    </section>

    <section id="modal" class="modal hidden" aria-modal="true" role="dialog">
      <div class="modal-panel">
        <h3 id="modalTitle">タイトル</h3>
        <p id="modalBody">本文</p>
        <div id="modalChoices" class="modal-choices"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
